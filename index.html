function ESTERILIZACION() {
  return (
    <div>
      <InfoBoxM>
        En el modo friendly NO esterilizas tú — todo viene esterilizado. Esta fase es preparar tu espacio de trabajo limpio antes de inocular. Reduce el riesgo de <GlossaryLink term="Contaminación">contaminación</GlossaryLink> al mínimo sin equipo de laboratorio.
      </InfoBoxM>

      <SectionTitleM>PREPARAR ESPACIO LIMPIO (1 hora antes de inocular)</SectionTitleM>
      <StepM num={1} text="Elige una habitación pequeña sin corrientes de aire. Baño es ideal: cierra puerta y ventana 30 min antes." why="Aire en movimiento = esporas de contaminantes flotando. Cuanto menos aire se mueva, menos riesgo." />
      <StepM num={2} text="Date una ducha de vapor caliente 5 minutos antes (ducha caliente con puerta cerrada, sin lavarte)." why="El vapor 'limpia' el aire — las esporas en suspensión caen al suelo con la humedad." />
      <StepM num={3} text="Limpia la superficie de trabajo con alcohol 70%: mesa, encimera, lo que vayas a usar. Espera 1 minuto a que se evapore." />
      <StepM num={4} text="Lávate manos y antebrazos con jabón 30 segundos. Sécate con toalla limpia o papel." />
      <StepM num={5} text="Ponte mascarilla FFP2, después guantes de nitrilo. Rocía guantes con alcohol y frótalos." why="Tu aliento, piel y pelo son las fuentes #1 de contaminación. Tapa todo." />
      <StepM num={6} text="No hables, no estornudes, no toques nada que no esté desinfectado. Si tocas algo sospechoso: re-rocía guantes." />

      <SectionTitleM>QUÉ NO HACER</SectionTitleM>
      <ErrorCardM
        error="Trabajar en cocina con ventana abierta o aire acondicionado"
        consecuencia="Esporas de moho del exterior caen sobre el spawn bag durante la inoculación. Contaminación garantizada."
        fix="Cierra todo. Apaga aire. Espera 30 min después de cocinar antes de inocular."
      />
      <ErrorCardM
        error="No usar mascarilla 'porque solo es 1 minuto'"
        consecuencia="Tu aliento contiene millones de bacterias y esporas. Una sola contaminación arruina el ciclo entero (4 semanas perdidas)."
        fix="Mascarilla FFP2 SIEMPRE durante inoculación. Cuesta 1€."
      />
      <ErrorCardM
        error="Reutilizar guantes sin desinfectar entre pasos"
        consecuencia="Tocaste el pomo de la puerta y luego el puerto de inyección. Bacterias entran al spawn bag."
        fix="Re-rocía guantes con alcohol cada vez que toques algo dudoso. Alcohol = barato, contaminación = cara."
      />
    </div>
  );
}

function INOCULACION() {
  return (
    <div>
      <InfoBoxM>
        Inyectar la <GlossaryLink term="Cultura líquida">cultura líquida</GlossaryLink> en el spawn bag por el puerto de inyección. 5 minutos. Es lo más sencillo del modo friendly — no abres nada.
      </InfoBoxM>

      <SectionTitleM>PROTOCOLO DE INOCULACIÓN</SectionTitleM>
      <StepM num={1} text="Ya en espacio limpio (ver fase anterior), saca el spawn bag y déjalo plano sobre la mesa. Localiza el puerto de inyección — es un círculo pequeño con cinta micropore o un disco de goma autoreparable." why="No hace falta abrir el spawn bag. La inyección entra y sale del puerto, queda sellado." />
      <StepM num={2} text="Desinfecta el puerto: rocía alcohol y frota con paño limpio. Espera 30 segundos a que se evapore TODO." why="Si queda alcohol, mata el micelio cuando lo inyectes. Espera siempre." />
      <StepM num={3} text="Saca la cultura líquida de su envase. Quita el capuchón de la aguja con cuidado — NO toques la aguja." />
      <StepM num={4} text="Flamea brevemente la aguja con mechero (3-5 segundos hasta rojo) y deja enfriar 20 segundos en el aire." why="Mata cualquier bacteria de la aguja. Si la inyectas caliente, mata el micelio." warning />
      <StepM num={5} text="Agita la jeringa suavemente — la cultura líquida tiene micelio que se asienta abajo." />
      <StepM num={6} text="Inyecta a través del puerto: clava la aguja, empuja 2-3ml de cultura, retira." why="2-3ml = punto óptimo. Más no acelera nada, menos riesga colonización lenta." />
      <StepM num={7} text="Repite: si el spawn bag tiene varios puntos de inyección sugeridos, inyecta 2-3 puntos diferentes (1-1.5ml en cada uno). Distribución más rápida." />
      <StepM num={8} text="Etiqueta con fecha + cepa. Guarda en armario oscuro a 24-26°C. NO mezcles, NO agites, NO abras nada." />

      <SectionTitleM>DESPUÉS DE INOCULAR</SectionTitleM>
      <InfoBoxM>
        Verás puntos blancos crecer en 5-10 días desde cada punto de inyección. Ese es el <GlossaryLink term="Micelio">micelio</GlossaryLink> colonizando. En 14-21 días el bag estará 100% blanco — listo para fructificar. NO abras NUNCA durante incubación.
      </InfoBoxM>

      <SectionTitleM>ERRORES COMUNES</SectionTitleM>
      <ErrorCardM
        error="No flamear la aguja o flamear y inyectar inmediatamente"
        consecuencia="Sin flamear: bacterias entran al bag → contaminación. Caliente: mata el micelio que estás inyectando → no germina."
        fix="Flamea 3-5s, espera 20s al aire. Misma aguja se puede usar 2-3 puntos sin reflamearla."
      />
      <ErrorCardM
        error="Inyectar más de 4ml por punto"
        consecuencia="Exceso de líquido = grano demasiado húmedo = bacterias se reproducen mejor que el micelio."
        fix="2-3ml total por bag (distribuido en 1-3 puntos). Suficiente para colonizar 1-2kg de grano."
      />
      <ErrorCardM
        error="Abrir el bag para 'verificar' durante incubación"
        consecuencia="Cada apertura introduce esporas contaminantes. El micelio aún no es robusto y pierde fácilmente."
        fix="No abrir hasta que esté 100% colonizado (blanco). Inspecciona visualmente desde fuera."
      />
    </div>
  );
}

  return (
    <div>

      <StepM num={1} text="Haz 4-6 agujeros de 2.5cm en los lados de la caja, a 10cm del fondo (2 en cada lado largo, 1-2 en los cortos)." why="Estos agujeros dan FAE pasivo durante fructificación. Sin ellos, las setas se asfixian con su propio CO₂." />
      <StepM num={2} text="Tapa los agujeros por dentro con cinta micropore (2 capas). Por fuera, la tapa queda lisa." why="Micropore deja pasar aire pero no esporas contaminantes." />
      <StepM num={3} text="Limpia el interior de la caja con alcohol 70%. Deja secar 5 min." />

      <SectionTitleM>MEZCLA SPAWN + SUSTRATO (S2B)</SectionTitleM>
      <StepM num={1} text="En espacio limpio (ducha vapor + alcohol + guantes + mascarilla, igual que inoculación), abre el spawn bag colonizado." />
      <StepM num={2} text="Rompe el bloque de spawn dentro del bag aplastándolo con las manos hasta separar todos los granos. NO saques aún." why="Granos separados colonizan el bulk uniformemente. Bloques compactos colonizan en partes." />
      <StepM num={3} text="Vuelca el spawn dentro del monotub. Encima, vuelca el bulk substrate CVG (2-3kg)." />
      <StepM num={4} text="Mezcla con manos enguantadas: 1 parte spawn por 2-3 partes bulk. Mezcla bien hasta que esté distribuido." why="Ratio 1:2 o 1:3 = punto óptimo. Más spawn = colonización rápida pero menos rendimiento. Menos spawn = riesgo contaminación." />

      <StepM num={2} text="Día 5-7: deberías ver micelio blanco extendiéndose desde los granos hacia el bulk." />
      <StepM num={3} text="Día 7-10: superficie completamente blanca o casi. Es momento de iniciar fructificación." />

      <SectionTitleM>FASE FRUCTIFICACIÓN (PINNING)</SectionTitleM>
      <StepM num={1} text="Cuando 90%+ de superficie esté blanca: nebuliza paredes del monotub con spray (NO el sustrato directamente)." why="Sube humedad a 90-95% sin encharcar el sustrato. Encharcamiento = contaminación." />
      <StepM num={2} text="Abre tapa 1 minuto, cierra. Esto da FAE + light shock que estimula fructificación." />
      <StepM num={3} text="Mete el monotub en zona con luz indirecta (no sol directo). Ciclo 12h luz / 12h oscuridad." />
      <StepM num={4} text="Rutina diaria: nebulizar paredes 2x/día, FAE manual abriendo tapa 1 min 2x/día." />
      <StepM num={5} text="Día 3-7 desde inicio fructificación: aparecen <GlossaryLink term='Primordio / Pinhead'>pinheads</GlossaryLink> (puntos blancos pequeños)." />
      <StepM num={6} text="Día 8-12: pinheads crecen rápido. Setas listas cuando los sombreros estén abriéndose o el <GlossaryLink term='Velo'>velo</GlossaryLink> a punto de romperse." />

      <SectionTitleM>ERRORES EN ESTA FASE</SectionTitleM>
      <ErrorCardM
        error="Nebulizar el sustrato directamente"
        consecuencia="Encharcamiento → bacterias proliferan → contaminación tardía justo cuando ya casi cosechabas."
        fix="Nebulizar SOLO las paredes y tapa. La humedad se distribuye por el aire del monotub."
      />
      <ErrorCardM
        error="No hacer FAE — dejar tapa cerrada todo el tiempo"
        consecuencia="CO₂ se acumula → setas crecen alargadas, finas, con sombreros pequeños. Forma 'pies de elefante' = bajo rendimiento."
        fix="Mínimo 2 FAE/día abriendo tapa 1 min. Si tienes ventiladores micropore = aún mejor."
      />
      <ErrorCardM
        error="Pinear demasiado pronto (antes de colonización completa)"
        consecuencia="Si bajas humedad y das luz cuando aún hay zonas sin colonizar, el bulk no llega a colonizarse y las contaminaciones aprovechan."
        fix="Espera al 95-100% colonización antes de iniciar fructificación. Paciencia. Si dudas, espera 2 días más."
      />
    </div>
  );
}

// GUÍA SETAS - CONTENIDO GENERAL
// Glosario, FAQ y términos aplicables a ambos modos (Kit + Manual)

function CONCEPTOS_SETAS() {
  const terms = [
    { term: "Micelio", def: "La 'raíz' del hongo. Red blanca de filamentos que colonizan el sustrato. El pan de micelio ya está completamente colonizado." },
    { term: "Primordio / Pinhead", def: "El brote más pequeño del hongo, casi invisible. Es el primer estadio visible del crecimiento de los frutos." },
    { term: "Flush", def: "Una cosecha de hongos de una misma oleada. Un span puede dar 3-6 flushes si se mantiene bien. Cada flush necesita 'cold shock' (24h en nevera) entre uno y otro." },
    { term: "FAE (Fresh Air Exchange)", def: "Intercambio de aire fresco. Los hongos necesitan O2. En SGFC se hace cada 6-12h abriendo la cámara. En monotub con ventilaciones pasivas ocurre automáticamente." },
    { term: "Humedad", def: "Los hongos necesitan 90-95% HR. Sin suficiente humedad los frutos se marchitan antes de madurar. De ahí la importancia de nebulizar frecuentemente." },
    { term: "SGFC (Still Air Fruit Chamber)", def: "Cámara de plástico estática usada para fructificación. Sin movimiento de aire (aún). Se usa perlita en el fondo para mantener humedad." },
    { term: "Monotub / Bulk tek", def: "Técnica donde se inocula un sustrato voluminoso en una caja de plástico, esperando a que colonice completamente (bulk), luego se frucciona en la misma caja. Más rendimiento que SGFC pero requiere más precisión." },
    { term: "Colonización", def: "El proceso de 7-21 días donde el micelio crece a través del sustrato/grano. Está completa cuando todo es blanco y rígido." },
    { term: "Contaminación", def: "Crecimiento de moho verdoso (Trichoderma) o bacterias. Ruina el proyecto. Se evita con asepsia durante inoculación." },
    { term: "Trichoderma", def: "Hongo contaminante verde. Es el enemigo #1. Crece rápido y mata el micelio de Psilocybe." },
    { term: "Cold shock", def: "Exponer el span a temperaturas 4-10°C durante 24h para inducir fructificación. Simula lluvias de otoño en la naturaleza." },
    { term: "Velo", def: "La membrana que conecta el sombrero (vela) al pie del hongo. Cuando se rompe es el pico de potencia máxima. Ideal cosechar justo antes o justo después." },
    { term: "Cracker dry", def: "Estado final de secado donde los hongos son tan secos que se quiebran al doblarse (como galleta). No deben dejar huella digital." },
    { term: "Spawn", def: "Grano colonizado con micelio. Es la 'semilla' para bulk tek. Típicamente 5-10 frascos (1-2kg) por un monotub." },
    { term: "Sustrato", def: "Material donde crece el hongo. En kit: pan de micelio. En manual: coco coir + perlita mezclado. Debe estar estéril." },
    { term: "SAB (Still Air Box)", def: "Caja hermética con guantes para inocular asépticamente. Reduce aire contaminado. Crítico en modo manual." },
    { term: "Perlita", def: "Mineral poroso que absorbe y evapora agua lentamente. Mantiene humedad en cámara sin encharcamiento." },
    { term: "Presecado", def: "Primera fase de secado a temperatura ambiente (2-3h). Elimina 50% del agua rápido antes de usar desecador." },
    { term: "Cultura líquida", def: "Micelio activo suspendido en agua nutritiva. Reemplaza la jeringa de esporas en el modo friendly: ya está en fase vegetativa (micelio), no esporas — coloniza más rápido (10-14 días vs 21) y resiste mejor la contaminación. Se inyecta igual que esporas pero con menos riesgo." },
    { term: "Spawn bag", def: "Bolsa de plástico transparente con grano de centeno (u otro cereal) ya cocido, esterilizado y sellado. Tiene un puerto de inyección con filtro micropore. En el modo friendly reemplaza la olla a presión + frascos: compras esterilizado, solo inyectas." },
    { term: "Bulk substrate CVG", def: "Coco coir + Vermiculita + Yeso (Gypsum) ya hidratado y pasteurizado. Listo para mezclar con spawn en monotub. Reemplaza el proceso manual de hidratar coco coir + pasteurizar." },
    { term: "FAE pasivo", def: "Fresh Air Exchange automático mediante agujeros con filtro micropore en el monotub. El intercambio de aire ocurre por difusión sin que tú abras nada. Alternativa al FAE activo (abrir la tapa)." },
    { term: "Casing layer", def: "Capa fina de vermiculita seca (1cm) sobre el sustrato colonizado. Mantiene humedad superficial sin encharcar y aumenta rendimiento 20-30%. Opcional pero recomendado en monotub." },
    { term: "Pinheads abortados", def: "Primordios que empezaron a crecer pero pararon (pequeños, marchitos, color marrón). Aparecen entre flushes. Hay que retirarlos antes del siguiente flush para evitar que pudran y contaminen." },
    { term: "Dunk", def: "Sumergir el sustrato del monotub en agua fría (nevera 6-12h) entre flushes. Cold shock + rehidratación. Induce el siguiente flush simulando lluvia + bajada de temperatura otoñal." },
    { term: "Flameado", def: "Pasar la aguja por la llama de un mechero hasta poner roja (3-5s). Mata cualquier bacteria. Esperar 20s para enfriar antes de inyectar (sino mata el micelio que estás inyectando)." },
    { term: "Esterilización", def: "Eliminar TODA forma de vida microbiana. Requiere olla a presión a 15 PSI durante 90 min. En el modo friendly te ahorras este paso comprando spawn bag y substrate ya esterilizados/pasteurizados." },
  ];

  const [search, setSearch] = React.useState('');
  const filtered = search.length > 1 ? terms.filter(t => t.term.toLowerCase().includes(search.toLowerCase()) || t.def.toLowerCase().includes(search.toLowerCase())) : null;

  return (
    <div>
      <InfoBoxM>
        Términos técnicos específicos de la guía de setas. Búsqueda para encontrar rápido cualquier palabra.
      </InfoBoxM>

      <div style={{ marginBottom: "20px" }}>
        <input
          type="text"
          placeholder="🔍 Buscar término..."
          value={search}
          onChange={e => setSearch(e.target.value)}
          style={{
            width: "100%", padding: "12px 16px", fontSize: "14px",
            background: MUSHROOM_COLORS.bg2, border: `1px solid ${MUSHROOM_COLORS.border1}`,
            borderRadius: "8px", color: MUSHROOM_COLORS.textBright, outline: "none",
          }}
        />
      </div>

      {filtered ? (
        <>
          <div style={{ fontSize: "10px", letterSpacing: "2px", color: MUSHROOM_COLORS.accent1, marginBottom: "10px" }}>
            {filtered.length} RESULTADO{filtered.length !== 1 ? 'S' : ''}
          </div>
          {filtered.length === 0 ? (
            <div style={{ fontSize: "13px", color: MUSHROOM_COLORS.accent2, padding: "12px" }}>No encontrado.</div>
          ) : (
            filtered.map((item, i) => (
              <div key={i} style={{ background: MUSHROOM_COLORS.bg2, border: `1px solid ${MUSHROOM_COLORS.border1}`, borderRadius: "8px", padding: "12px 14px", marginBottom: "8px" }}>
                <div style={{ fontSize: "13px", fontWeight: "bold", color: MUSHROOM_COLORS.accent1, marginBottom: "4px" }}>{item.term}</div>
                <div style={{ fontSize: "13px", color: MUSHROOM_COLORS.accent3, lineHeight: "1.5" }}>{item.def}</div>
              </div>
            ))
          )}
        </>
      ) : (
        terms.map((item, i) => (
          <div key={i} style={{ background: MUSHROOM_COLORS.bg2, border: `1px solid ${MUSHROOM_COLORS.border1}`, borderRadius: "8px", padding: "12px 14px", marginBottom: "8px" }}>
            <div style={{ fontSize: "13px", fontWeight: "bold", color: MUSHROOM_COLORS.accent1, marginBottom: "4px" }}>{item.term}</div>
            <div style={{ fontSize: "13px", color: MUSHROOM_COLORS.accent3, lineHeight: "1.5" }}>{item.def}</div>
          </div>
        ))
      )}
    </div>
  );
}

function FAQ_SETAS() {
  return (
    <div>
      <InfoBoxM>
        Preguntas comunes sobre cultivo de setas. Situaciones reales que encuentran principiantes.
      </InfoBoxM>

      {[
        { q: "¿Cuánto tiempo tarda todo el ciclo?", r: "Kit: 2-3 semanas desde que sacas el pan hasta la 1ª cosecha. Manual: 4-6 semanas (1-2 de esterilización + inoculación, 2-3 de incubación, 1-2 fructificación)." },
        { q: "¿Por qué se contamina?", r: "Bacterias o moho entran durante la inoculación. Una jeringa de esporas contaminada o una técnica SAB deficiente son causas. Manual requiere mucha más asepsia que kit." },
        { q: "¿Cuándo cosechar?", r: "Antes de que se rompa el velo (membrana bajo el sombrero). Justo antes o justo después es óptimo. Si esperas demasiado, suelta esporas negras en el sustrato (afecta próximos flushes)." },
        { q: "¿Qué hacer entre flushes?", r: "Cold shock: 24h en nevera. Luego sacas, dejas en SGFC, nebulizas y esperas a que salgan nuevos primordi (3-7 días). Puedes hacer 3-6 flushes totales." },
        { q: "¿Puedo secar los hongos en horno?", r: "NO a temperatura alta — degrada los compuestos activos. Usa presecado en bandeja (2-3h a temperatura ambiente) + desecador con silica gel (24h) = cracker dry sin calor." },
        { q: "¿Duran mucho tiempo almacenados?", r: "Cracker dry en bolsa hermética en lugar frío/oscuro dura años. Lo ideal: bolsa hermética + sílica gel + congelador = 2+ años sin perder potencia." },
        { q: "¿Kit o Manual? ¿Cuál para empezar?", r: "Kit si quieres rápido y fácil (2 semanas). Manual si eres paciente y quieres aprender microbiología (4-6 semanas, mucho mayor rendimiento). Kit es 80% autónomo. Manual requiere precisión." },
        { q: "¿Qué temperatura exacta para incubación?", r: "Idealmente 24-28°C. Menos de 20°C = muy lento. Más de 30°C = Trichoderma aprovecha. Manta térmica es tu aliada si en tu casa hace frío." },
        { q: "¿Está legal cultivar setas?", r: "Varía por país. Psilocybe es Schedule I en muchos lugares. Este contenido es puramente educativo. Verifica leyes locales." },
        { q: "¿Cuánto miligramo por hongo?", r: "Varía mucho (50-500mg dependiendo especie, tamaño, condiciones crecimiento). Empieza bajo (0.5-1g) y titula. No hay dosis segura — educación es clave." },
        { q: "¿Se pone molido en algo o entero?", r: "Entero si es posible (absorción lenta, viaje prolongado). Molido en té (lemon tek) = efecto más rápido. Molido en chocolate = enmascarar sabor." },
        { q: "¿Pertenezco a algún grupo/comunidad?", r: "r/shrooms, Shroomery, Erowid son comunidades. Pero cultivo casero = responsabilidad personal. No hay garantías de seguridad." },
      ].map((item, i) => (
        <div key={i} style={{ background: MUSHROOM_COLORS.bg2, border: `1px solid ${MUSHROOM_COLORS.border1}`, borderRadius: "10px", padding: "14px", marginBottom: "12px" }}>
          <div style={{ fontSize: "13px", fontWeight: "bold", color: MUSHROOM_COLORS.textBright, marginBottom: "8px" }}>❓ {item.q}</div>
          <div style={{ fontSize: "12px", color: MUSHROOM_COLORS.accent3, lineHeight: "1.6" }}>{item.r}</div>
        </div>
      ))}
    </div>
  );
}


function GuiaCultivo() {

  const [mode, setMode] = useState("interior");
  const [guide, setGuide] = useState("cannabis"); // "cannabis" | "mushroom"
  const [mushroomMode, setMushroomMode] = useState("kit"); // "kit" | "manual" | "general"
  const [activeMushroomKit, setActiveMushroomKit] = useState("compra_kit");
  const [activeMushroomManual, setActiveMushroomManual] = useState("compra_manual");
  const [activeMushroomGen, setActiveMushroomGen] = useState("conceptos_setas");
  const [activePhase, setActivePhase] = useState("compra");
  const [activePhaseExt, setActivePhaseExt] = useState("compra_ext");
  const [activePhaseGen, setActivePhaseGen] = useState("mis_semillas");

  const navigate = (targetMode, targetPhase) => {
    setMode(targetMode);
    if (targetMode === "interior") setActivePhase(targetPhase);
    else if (targetMode === "exterior") setActivePhaseExt(targetPhase);
    else setActivePhaseGen(targetPhase);
    window.scrollTo({ top: 0, behavior: "smooth" });
  };

  const navigateToGlossary = (term) => {
    setGuide("mushroom");
    setMushroomMode("general");
    setActiveMushroomGen("conceptos_setas");
    window.scrollTo({ top: 0, behavior: "smooth" });
    setTimeout(() => {
      const searchInput = document.querySelector('input[placeholder*="Buscar"]');
      if (searchInput) {
        searchInput.value = term;
        searchInput.dispatchEvent(new Event('input', { bubbles: true }));
        searchInput.focus();
      }
    }, 100);
  };

  React.useEffect(() => {
    window.navigateToGlossary = navigateToGlossary;
    return () => { delete window.navigateToGlossary; };
  }, []);

  const renderContent = () => {
    if (guide === "cannabis") {
      if (mode === "interior") {
        switch (activePhase) {
          case "compra": return <COMPRA />;
          case "semillas_int": return <SEMILLAS_INT />;
          case "antes": return <ANTES />;
          case "goteo": return <GOTEO />;
          case "germinacion": return <GERMINACION />;
          case "vegetativa": return <VEGETATIVA />;
          case "poda": return <PODA />;
          case "floracion": return <FLORACION />;
          case "cosecha": return <COSECHA />;
          case "plagas_int": return <PLAGAS_INT />;
          default: return null;
        }
      } else if (mode === "exterior") {
        switch (activePhaseExt) {
          case "compra_ext": return <COMPRA_EXT />;
          case "ubicacion": return <UBICACION />;
          case "germinacion_ext": return <GERMINACION_EXT />;
          case "semillas_ext": return <SEMILLAS_EXT />;
          case "fases_ext": return <FASES_EXT />;
          case "riego_ext": return <RIEGO_EXT />;
          case "plagas": return <PLAGAS />;
          case "cosecha_ext": return <COSECHA_EXT />;
          default: return null;
        }
      } else {
        switch (activePhaseGen) {
          case "timeline": return <TIMELINE navigate={navigate} />;
          case "mis_semillas": return <MIS_SEMILLAS />;
          case "poda_gen": return <PODA />;
          case "cosecha_gen": return <COSECHA />;
          case "conservacion": return <CONSERVACION />;
          case "diagnostico": return <DIAGNOSTICO />;
          case "extracciones": return <EXTRACCIONES />;
          case "faq": return <FAQ />;
          case "conceptos": return <CONCEPTOS />;
          default: return null;
        }
      }
    } else {
      // Mushroom guide
      if (mushroomMode === "kit") {
        switch (activeMushroomKit) {
          case "compra_kit": return <COMPRA_SETAS_KIT />;
          case "setup_kit": return <SETUP_SETAS_KIT />;
          case "incubacion_kit": return <INCUBACION_SETAS_KIT />;
          case "fructificacion_kit": return <FRUCTIFICACION_SETAS_KIT />;
          case "cosecha_kit": return <COSECHA_SETAS_KIT />;
          case "secado_kit": return <SECADO_SETAS_KIT />;
          default: return <COMPRA_SETAS_KIT />;
        }
      } else if (mushroomMode === "manual") {
        switch (activeMushroomManual) {
          case "compra_manual": return <COMPRA_SETAS_MANUAL />;
          case "esterilizar": return <ESTERILIZACION />;
          case "inoculacion": return <INOCULACION />;
          case "incubacion_manual": return <INCUBACION_SETAS_MANUAL />;
          case "fructificacion_manual": return <FRUCTIFICACION_SETAS_MANUAL />;
          case "cosecha_manual": return <COSECHA_SETAS_MANUAL />;
          case "secado_manual": return <SECADO_SETAS_MANUAL />;
          default: return <COMPRA_SETAS_MANUAL />;
        }
      } else {
        switch (activeMushroomGen) {
          case "conceptos_setas": return <CONCEPTOS_SETAS />;
          case "faq_setas": return <FAQ_SETAS />;
          default: return null;
        }
      }
    }
  };

  const currentPhases = guide === "cannabis"
    ? (mode === "interior" ? phases : mode === "exterior" ? extPhases : generalPhases)
    : (mushroomMode === "kit" ? mushroomKitPhases : mushroomMode === "manual" ? mushroomManualPhases : mushroomGeneral);

  const currentActive = guide === "cannabis"
    ? (mode === "interior" ? activePhase : mode === "exterior" ? activePhaseExt : activePhaseGen)
    : (mushroomMode === "kit" ? activeMushroomKit : mushroomMode === "manual" ? activeMushroomManual : activeMushroomGen);

  const setCurrentActive = guide === "cannabis"
    ? (mode === "interior" ? setActivePhase : mode === "exterior" ? setActivePhaseExt : setActivePhaseGen)
    : (mushroomMode === "kit" ? setActiveMushroomKit : mushroomMode === "manual" ? setActiveMushroomManual : setActiveMushroomGen);

  const colors = guide === "cannabis" ? CANNABIS_COLORS : MUSHROOM_COLORS;
  const title = guide === "cannabis" ? "🌿 Guía de Cultivo Cannabis" : "🍄 Guía de Cultivo Setas";
  const modeOptions = guide === "cannabis"
    ? [
        { id: "interior", label: "🏠 Interior", sub: "Armario" },
        { id: "exterior", label: "🌲 Exterior", sub: "Bosque" },
        { id: "general", label: "📋 General", sub: "Común" },
      ]
    : [
        { id: "kit", label: "🛒 Kit", sub: "Listo" },
        { id: "manual", label: "🧫 Manual", sub: "Desde 0" },
        { id: "general", label: "📋 General", sub: "Común" },
      ];

  return (
    <div className="app-layout" style={{ fontFamily: "Georgia, serif", background: colors.bg, minHeight: "100vh", color: colors.text }}>
      <div className="app-header" style={{ background: colors.gradient, padding: "24px 24px 20px", textAlign: "center", borderBottom: `2px solid ${colors.borderAccent}` }}>
        <div style={{ marginBottom: "16px" }}>
          <div style={{ display: "flex", gap: "4px", justifyContent: "center", marginBottom: "16px" }}>
            {[{ id: "cannabis", emoji: "🌿", label: "Cannabis" }, { id: "mushroom", emoji: "🍄", label: "Setas" }].map(g => (
              <button key={g.id} onClick={() => { setGuide(g.id); setMode(g.id === "cannabis" ? "interior" : "kit"); }} style={{
                padding: "8px 16px", fontSize: "12px", fontWeight: "bold", border: "none",
                borderRadius: "8px", cursor: "pointer", transition: "all 0.2s",
                background: guide === g.id ? colors.accent1 : colors.border1,
                color: guide === g.id ? colors.bg : colors.accent1,
              }}>
                {g.emoji} {g.label}
              </button>
            ))}
          </div>
        </div>
        <h1 style={{ fontSize: "22px", fontWeight: "bold", margin: "0 0 16px", color: colors.textBright }}>
          {title}
        </h1>
        <div className="mode-switcher" style={{ display: "flex", background: colors.bg2, borderRadius: "12px", padding: "4px", gap: "4px", maxWidth: "360px", margin: "0 auto" }}>
          {modeOptions.map((m) => (
            <button key={m.id} onClick={() => guide === "cannabis" ? setMode(m.id) : setMushroomMode(m.id)} style={{
              flex: 1, padding: "10px 6px", border: "none", borderRadius: "8px",
              background: (guide === "cannabis" ? mode : mushroomMode) === m.id ? colors.accent1 : "transparent",
              color: (guide === "cannabis" ? mode : mushroomMode) === m.id ? colors.bg : colors.accent1,
              cursor: "pointer", transition: "all 0.2s",
            }}>
              <div style={{ fontSize: "12px", fontWeight: "bold" }}>{m.label}</div>
              <div style={{ fontSize: "10px", color: (guide === "cannabis" ? mode : mushroomMode) === m.id ? colors.accent2 : colors.border1, marginTop: "2px" }}>{m.sub}</div>
            </button>
          ))}
        </div>
      </div>

      <div className="tabs-nav" style={{ display: "flex", overflowX: "auto", background: colors.bg2, borderBottom: `1px solid ${colors.border1}` }}>
        {currentPhases.map((phase) => (
          <button key={phase.id} onClick={() => setCurrentActive(phase.id)}
            className={currentActive === phase.id ? "active" : ""}
            style={{
              flex: "1 0 auto", minWidth: "65px", padding: "12px 6px",
              border: "none", background: currentActive === phase.id ? colors.bg3 : "transparent",
              color: currentActive === phase.id ? colors.textBright : colors.accent1,
              cursor: "pointer", fontSize: "10px", textAlign: "center",
              borderBottom: currentActive === phase.id ? `3px solid ${colors.accent1}` : "3px solid transparent",
              transition: "all 0.2s",
            }}>
            <div className="tab-emoji" style={{ fontSize: "18px", marginBottom: "3px" }}>{phase.emoji}</div>
            <div className="tab-title" style={{ fontWeight: currentActive === phase.id ? "bold" : "normal", lineHeight: "1.2" }}>{phase.title}</div>
            <div className="tab-sub" style={{ fontSize: "9px", color: colors.border1, marginTop: "2px" }}>{phase.subtitle}</div>
          </button>
        ))}
      </div>

      <div className="main-content" style={{ padding: "20px", maxWidth: "600px", margin: "0 auto", color: colors.text }}>
        {renderContent()}
      </div>

      <div className="footer-calendar" style={{ background: colors.bg2, borderTop: `1px solid ${colors.border1}`, padding: "20px" }}>
        {guide === "cannabis" ? (
          mode === "interior" ? (
            <>
              <div style={{ fontSize: "10px", letterSpacing: "3px", color: colors.accent1, marginBottom: "12px", textAlign: "center" }}>PLANNING INTERIOR — 3 COSECHAS/AÑO (SIN VERANO)</div>
              <div style={{ display: "flex", gap: "6px", overflowX: "auto" }}>
                {[{mes:"RONDA 1",ev:"Sep-Oct: germina"},{mes:"DIC",ev:"Cosecha 1ª"},{mes:"RONDA 2",ev:"Ene-Feb: germina"},{mes:"ABR",ev:"Cosecha 2ª"},{mes:"RONDA 3",ev:"Mar-Abr: germina"},{mes:"JUN",ev:"Cosecha 3ª"},{mes:"⛔",ev:"Jul-Ago: pausa"}].map((m,i) => (
                  <div key={i} style={{ flex:"1 0 60px", background:colors.border1, borderRadius:"8px", padding:"10px 6px", textAlign:"center" }}>
                    <div style={{ fontSize:"11px", fontWeight:"bold", color: colors.accent1, marginBottom:"4px" }}>{m.mes}</div>
                    <div style={{ fontSize:"10px", color: colors.accent2, lineHeight:"1.3" }}>{m.ev}</div>
                  </div>
                ))}
              </div>
            </>
          ) : mode === "exterior" ? (
            <>
              <div style={{ fontSize: "10px", letterSpacing: "3px", color: colors.accent1, marginBottom: "12px", textAlign: "center" }}>PLANNING EXTERIOR — FOTOPERIODO</div>
              <div style={{ display: "flex", gap: "6px", overflowX: "auto" }}>
                {[{mes:"MAR-MAY",ev:"🌱 Germina y planta"},{mes:"JUN",ev:"🌿 Veg. temprana"},{mes:"JUL",ev:"🌿 Veg. máxima"},{mes:"AGO",ev:"🌸 Inicio flor."},{mes:"SEP",ev:"🌸 Flor. avanzada"},{mes:"OCT",ev:"✂️ Cosecha"}].map((m,i) => (
                  <div key={i} style={{ flex:"1 0 60px", background: colors.border1, borderRadius:"8px", padding:"10px 6px", textAlign:"center" }}>
                    <div style={{ fontSize:"11px", fontWeight:"bold", color: colors.accent1, marginBottom:"4px" }}>{m.mes}</div>
                    <div style={{ fontSize:"10px", color: colors.accent2, lineHeight:"1.3" }}>{m.ev}</div>
                  </div>
                ))}
              </div>
            </>
          ) : (
            <div style={{ textAlign: "center", color: colors.accent1, fontSize: "12px", padding: "8px" }}>
              📋 Secciones comunes a interior y exterior — siempre a mano
            </div>
          )
        ) : (
          <div style={{ textAlign: "center", color: colors.accent1, fontSize: "12px", padding: "8px" }}>
            🍄 Ciclo típico setas: 2-6 semanas (Kit con SGFC) ⎜ 4-8 semanas (Manual desde cero)
          </div>
        )}
      </div>
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<GuiaCultivo />);
  </script>
</body>
</html>
