<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guía de Cultivo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a1a0f; font-family: 'Inter', system-ui, -apple-system, sans-serif; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; letter-spacing: -0.005em; }
    h1, h2, h3, .heading-serif { font-family: 'Fraunces', Georgia, serif; letter-spacing: -0.015em; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #0d1f14; }
    ::-webkit-scrollbar-thumb { background: #2d6a4f; border-radius: 3px; }
    button { cursor: pointer; font-family: inherit; }
    /* Override inline Georgia, serif fontFamily across all components */
    [style*="Georgia"] { font-family: 'Inter', system-ui, sans-serif !important; }

    /* Guides toggle: dropdown en mobile, filas en desktop */
    @media (min-width: 900px) {
      .guides-dropdown { display: none !important; }
      .guides-row { display: flex !important; }
    }

    /* Desktop layout: contenido centrado, tabs horizontales (igual que mobile pero más ancho) */
    @media (min-width: 900px) {
      .app-header {
        padding: 32px 48px 24px !important;
      }
      .app-header h1 {
        font-size: 32px !important;
      }
      .mode-switcher {
        max-width: 800px !important;
      }
      .mode-switcher button div:first-child {
        font-size: 15px !important;
      }
      .tabs-nav {
        padding: 0 24px;
      }
      .tabs-nav-inner {
        max-width: 960px;
        margin: 0 auto;
      }
      .main-content {
        padding: 32px 48px !important;
        max-width: 960px !important;
        margin: 0 auto !important;
      }
      .footer-calendar {
        padding: 24px 40px !important;
      }
      .footer-calendar-inner {
        max-width: 960px;
        margin: 0 auto;
      }
      .main-content .step-card,
      .main-content .error-card,
      .main-content .info-box {
        font-size: 14px;
      }
    }

    @media (min-width: 1200px) {
      .main-content {
        max-width: 1040px !important;
        padding: 36px 64px !important;
      }
      .tabs-nav-inner, .footer-calendar-inner {
        max-width: 1040px;
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
{/*INSERT_CONTENT_HERE*/}
  </script>
</body>
</html>
